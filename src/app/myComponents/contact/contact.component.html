<main>
    <section class="contact-section sec-padding">
        <div class="container">
            <div class="row">
                <div class="section-title">
                    <h2>
                        Contact <span style="color: #eece1a;">Me</span>
                    </h2>
                </div>
            </div>
            <div class="row">
                <div class="contact-form p-4">
                    <form action="mailto:Saritanimwal@gmail.com" method="post" enctype="text/plain">
                        <div class="row">
                            <div class="input-group">
                                <input type="text" name="name" placeholder="Name" autocomplete="name" required class="input-control">
                            </div>
                            <div class="input-group">
                                <input type="email" name="email" placeholder="Email" autocomplete="email" required class="input-control">
                            </div>
                            <div class="input-group">
                                <input type="text" name="subject" placeholder="Subject" required class="input-control">
                            </div>
                            <div class="input-group">
                                <textarea name="message" placeholder="Message" required class="input-control"></textarea>
                            </div>
                            <div class="submit-btn">
                                <button type="submit" class="btn">Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="contact-info p-4">
                    <div class="contact-info-item">
                        <h3>Email</h3>
                        <p><a href="mailto:Saritanimwal@gmail.com">Saritanimwal@gmail.com</a></p>
                    </div>
                    <div class="contact-info-item">
                        <h3>Phone</h3>
                        <p>91 767860****</p>
                    </div>
                    <div class="contact-info-item">
                        <h3>Follow Me</h3>
                        <div class="social-links">
                            <a href="https://github.com/Sarita149" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
                                <i class="fab fa-github" aria-hidden="true"></i>
                            </a>
                            <a href="mailto:Saritanimwal@gmail.com" aria-label="Email Sarita Nimwal">
                                <i class="fas fa-envelope" aria-hidden="true"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
